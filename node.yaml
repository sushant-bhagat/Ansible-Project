---
- name: Install Node.js
  hosts: webservers
  become: true
  gather_facts: true

  tasks:
    - name: Ensure dependencies are installed
      apt:
        name:
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Download Nodesource setup script
      # This example installs Node.js 20 (current LTS)
      get_url:
        url: https://deb.nodesource.com/setup_20.x
        dest: /tmp/nodesource_setup.sh
        mode: '0755'

    - name: Run Nodesource setup script
      command: /tmp/nodesource_setup.sh
      # This prevents the script from running every time if node is already there
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes
