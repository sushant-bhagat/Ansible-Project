---
- name: Install and Configure Apache2 Web Server
  hosts: webservers
  become: yes
  gather_facts: yes
  
  vars:
    web_root: /var/www/html
    custom_index: |
      <h1>Apache2 Installed by Ansible! 🎉</h1>
      <p>Server: {{ ansible_hostname }}</p>
      <p>IP: {{ ansible_default_ipv4.address }}</p>
      <p>Time: {{ ansible_date_time.date }}</p>

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install Apache2
      apt:
        name: apache2
        state: present

    - name: Enable Apache2 service
      systemd:
        name: apache2
        state: started
        enabled: yes

    - name: Create custom index.html
      copy:
        content: "{{ custom_index }}"
        dest: "{{ web_root }}/index.html"
        owner: www-data
        group: www-data
        mode: '0644'

    - name: Allow HTTP traffic (UFW)
      ufw:
        rule: allow
        port: '80'
        state: enabled

  handlers:
    - name: Restart Apache2
      systemd:
        name: apache2
        state: restarted
