---
- name: Install Apache2 on Remote Server
  hosts: 192.168.160.131
  become: yes
  gather_facts: yes

  tasks:
    - name: Update apt cache
      apt: update_cache=yes

    - name: Install Apache2
      apt: 
        name: apache2
        state: latest

    - name: Kill port conflicts
      shell: fuser -k 80/tcp 443/tcp
      ignore_errors: yes

    - name: Start Apache2
      systemd:
        name: apache2
        state: started
        enabled: yes

    - name: Create index.html
      copy:
        content: "<h1>Apache2 Deployed! {{ ansible_hostname }}</h1>"
        dest: /var/www/html/index.html
